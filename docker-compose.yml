version: '3.8'
services:
  web-app:
    image: node:18-alpine
    container_name: uas_web_app
    restart: always
    working_dir: /home/node/app
    command: >
      sh -c "echo '<h1>Website UAS Raihan Berhasil Berjalan dengan Docker!</h1>' > index.html &&
            npx http-server -p 3000"
    ports:
      - "3000:3000"
  # 2. Monitoring Tool (Uptime Kuma)
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime_kuma
    restart: always
    volumes:
      - kuma-data:/app/data
    ports:
      - "3001:3001"
  # 3. Reverse Proxy (Nginx)
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
volumes:
  kuma-data:
